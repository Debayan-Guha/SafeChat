spring:
  application:
    name: chatservice
  
  # MongoDB Configuration (updated to non-deprecated properties)
  mongodb:
    host: localhost
    port: 27017
    uri: mongodb://localhost:27017/chatservice
    auto-index-creation: true 
  
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        retries: 3

# JWT Configuration
jwt:
  secretKey: your-256-bit-secret-key-for-jwt-please-change-in-production
  expirationTime: 86400000
  issuer: SAFECHAT

# Encryption Configuration
encryption:
  secretKey: your-24-char-secret-key!

# Server Configuration
server:
  port: 8080

