spring:
  application:
    name: userservice
  
  datasource:
    url: jdbc:mysql://localhost:3306/safechat
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

#Mail
  mail:
    host: smtp.gmail.com
    port: 587
    username: guhadebayan5@gmail.com
    password: jrwfwoxfdkzzcjap
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

#Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        retries: 0
        request.timeout.ms: 5000
        max.block.ms: 5000
    consumer:
      group-id: user-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Prevent infinite retry on connection failure
        reconnect.backoff.ms: 10000
        reconnect.backoff.max.ms: 10000
        retry.backoff.ms: 10000       # Timeout after 30 seconds

    listener:
      missing-topics-fatal: false  # Don't fail if topic doesn't exist
      ack-mode: record
    # Disable auto-creation of topics
    admin:
      auto-create: false

# JWT Configuration
jwt:
  secretKey: your-256-bit-secret-key-for-jwt-please-change-in-production
  expirationTime: 86400000
  issuer: SAFECHAT

# Encryption Configuration
encryption:
  aes:
    secretKey: your-24-char-secret-key!
  pbkdf2:
    secretKey: your-24-char-secret-key!


# API Key for Service-to-Service Communication
service:
  api:
    key: your-secure-api-key-here

# Chat Service URL
chat:
  service:
    url: http://localhost:8082

# Server Configuration
server:
  port: 8080

