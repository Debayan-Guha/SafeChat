server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: user-service
    static_configs:
      - targets:
          - localhost
        labels:
          app: user-service
          service: user-service
          job: spring-boot
          __path__: /var/log/user-service/*.log

  - job_name: chat-service
    static_configs:
      - targets:
          - localhost
        labels:
          app: chat-service
          service: chat-service
          job: spring-boot
          __path__: /var/log/chat-service/*.log